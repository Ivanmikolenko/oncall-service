global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'oncall-service'
    static_configs:
      - targets: 
          - '172.17.0.1:30080'
          - '172.17.0.1:30081'
    metrics_path: '/metrics'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['172.17.0.1:9100']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['172.17.0.1:9121']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kube-state-metrics'
    static_configs:
      - targets: ['172.17.0.1:30082']
