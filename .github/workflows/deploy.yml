name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: |
          NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

  deploy-dev:
    name: Deploy to dev
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: |
          IMAGE="${{ needs.build.outputs.image }}:sha-${{ github.sha }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin
          docker pull "$IMAGE"
          docker save "$IMAGE" -o /tmp/oncall-image.tar
          sudo k3s ctr images import /tmp/oncall-image.tar
          rm /tmp/oncall-image.tar

      - name: Deploy to dev
        run: |
          export NAMESPACE=dev
          export NODE_PORT=30080
          export IMAGE="${{ needs.build.outputs.image }}:sha-${{ github.sha }}"
          export DB_HOST=10.42.0.1
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export REDIS_SENTINEL_HOSTS="10.42.0.1:26379,10.42.0.1:26380,10.42.0.1:26381"
          envsubst < k3s/secret.yaml     | sudo kubectl apply -f -
          envsubst < k3s/deployment.yaml | sudo kubectl apply -f -
          envsubst < k3s/service.yaml    | sudo kubectl apply -f -
          sudo kubectl rollout status deployment/oncall-service -n dev --timeout=120s

  deploy-prod:
    name: Deploy to prod
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image
        run: |
          IMAGE="${{ needs.build.outputs.image }}:sha-${{ github.sha }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} --password-stdin
          docker pull "$IMAGE"
          docker save "$IMAGE" -o /tmp/oncall-image.tar
          sudo k3s ctr images import /tmp/oncall-image.tar
          rm /tmp/oncall-image.tar

      - name: Deploy to prod
        run: |
          export NAMESPACE=prod
          export NODE_PORT=30081
          export IMAGE="${{ needs.build.outputs.image }}:sha-${{ github.sha }}"
          export DB_HOST=10.42.0.1
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export REDIS_SENTINEL_HOSTS="10.42.0.1:26379,10.42.0.1:26380,10.42.0.1:26381"
          envsubst < k3s/secret.yaml     | sudo kubectl apply -f -
          envsubst < k3s/deployment.yaml | sudo kubectl apply -f -
          envsubst < k3s/service.yaml    | sudo kubectl apply -f -
          sudo kubectl rollout status deployment/oncall-service -n prod --timeout=120s
