version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       notes
      POSTGRES_USER:     notes
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notes"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_master_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-replica-1:
    image: redis:7-alpine
    container_name: redis-replica-1
    restart: unless-stopped
    command: redis-server --replicaof redis-master 6379 --loglevel warning
    ports:
      - "6380:6379"
    depends_on:
      redis-master:
        condition: service_healthy

  redis-replica-2:
    image: redis:7-alpine
    container_name: redis-replica-2
    restart: unless-stopped
    command: redis-server --replicaof redis-master 6379 --loglevel warning
    ports:
      - "6381:6379"
    depends_on:
      redis-master:
        condition: service_healthy

  sentinel-1:
    image: redis:7-alpine
    container_name: sentinel-1
    restart: unless-stopped
    command: >
      sh -c "redis-sentinel /etc/sentinel.conf"
    volumes:
      - ./sentinel.conf:/etc/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2

  sentinel-2:
    image: redis:7-alpine
    container_name: sentinel-2
    restart: unless-stopped
    command: >
      sh -c "redis-sentinel /etc/sentinel.conf"
    volumes:
      - ./sentinel.conf:/etc/sentinel.conf
    ports:
      - "26380:26379"
    depends_on:
      - redis-master

  sentinel-3:
    image: redis:7-alpine
    container_name: sentinel-3
    restart: unless-stopped
    command: >
      sh -c "redis-sentinel /etc/sentinel.conf"
    volumes:
      - ./sentinel.conf:/etc/sentinel.conf
    ports:
      - "26381:26379"
    depends_on:
      - redis-master

volumes:
  postgres_data:
  redis_master_data:
